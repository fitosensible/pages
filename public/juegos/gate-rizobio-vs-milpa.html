<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Elige tu experiencia — Fitosensible</title>
<!--
  Página independiente para hospedar en /juegos/gate-rizobio-milpa.html
  y embeber en el artículo con un <iframe>, igual que el quiz y la oruga.
  Ajusta la ruta del iframe del juego (IFRAME_JUEGO_SRC) más abajo.
-->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,500&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  html,body{background:transparent}
  body{margin:0;padding:4px}
  .gt-root{--papel:#F4EFE3;--verde:#163A2E;--tinta:#1B2A22;--dorado:#C08A2D}
  .gt-root *{box-sizing:border-box;margin:0;padding:0}
  .gt-root{color:var(--tinta);-webkit-font-smoothing:antialiased}
  .gt-root .card{width:100%;
    background:linear-gradient(165deg,#EEF2E9 0%,#E3EADB 55%,#DCE6D2 100%);
    border:1px solid rgba(22,58,46,0.18);border-radius:20px;
    box-shadow:0 18px 40px -18px rgba(22,58,46,0.45),inset 0 1px 0 rgba(255,255,255,0.6);
    padding:1.2rem 0.8rem 1rem;overflow:hidden}
  .gt-root .top{font-size:0.72rem;letter-spacing:0.16em;text-transform:uppercase;color:var(--dorado);
    font-weight:700;display:flex;align-items:center;gap:0.4rem;margin-bottom:0.6rem}
  .gt-root .top .dot{width:7px;height:7px;border-radius:50%;background:var(--dorado);display:inline-block}
  .gt-root .q{font-family:'Newsreader',serif;font-weight:500;font-size:1.5rem;color:var(--verde);
    line-height:1.28;text-align:center;margin-bottom:1.5rem}
  .gt-root .opts{display:flex;flex-direction:column;gap:0.7rem}
  .gt-root .opt{display:flex;align-items:flex-start;gap:0.7rem;text-align:left;padding:1rem 1.1rem;
    border:1.5px solid rgba(22,58,46,0.16);border-radius:14px;background:rgba(255,255,255,0.65);
    color:var(--tinta);cursor:pointer;width:100%;font-family:'Work Sans',sans-serif;
    transition:transform .12s ease,box-shadow .15s ease,border-color .15s ease}
  .gt-root .opt:hover{transform:translateY(-2px);border-color:var(--dorado);
    box-shadow:0 8px 18px -10px rgba(22,58,46,0.5)}
  .gt-root .opt .emo{font-size:1.7rem;line-height:1.2;flex-shrink:0}
  .gt-root .opt .tit{font-family:'Newsreader',serif;font-weight:600;font-size:1.12rem;color:var(--verde);
    display:block;margin-bottom:0.2rem}
  .gt-root .opt .desc{font-size:0.86rem;color:rgba(22,58,46,0.72);line-height:1.4;display:block}
  .gt-root .back{font-family:'Work Sans',sans-serif;font-size:0.82rem;font-weight:600;color:var(--verde);
    background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:0.3rem;
    margin-bottom:0.9rem;padding:0;opacity:0.75}
  .gt-root .back:hover{opacity:1}
  .gt-fade{animation:gtFade .35s ease both}
  @keyframes gtFade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .gt-root iframe{width:100%;height:660px;border:0;border-radius:16px;display:block;transition:height .2s ease}
  .gt-root .bar{height:7px;background:rgba(22,58,46,0.13);border-radius:999px;overflow:hidden;margin-bottom:0.5rem}
  .gt-root .bar-fill{height:100%;width:0;border-radius:999px;background:linear-gradient(90deg,var(--dorado),#e0b25e);transition:width 0.45s cubic-bezier(.4,0,.2,1)}
  .gt-root .counter{font-size:0.72rem;letter-spacing:0.09em;text-transform:uppercase;color:rgba(22,58,46,0.5);font-weight:600;margin-bottom:1.15rem}
  .gt-root .q-text{font-family:'Newsreader',serif;font-weight:500;font-size:1.28rem;color:var(--verde);line-height:1.3;margin-bottom:1.1rem}
  .gt-root .qopts{display:flex;flex-direction:column;gap:0.55rem}
  .gt-root .qopt{font-family:'Work Sans',sans-serif;font-size:0.98rem;text-align:left;padding:0.8rem 1rem;
    border:1.5px solid rgba(22,58,46,0.16);border-radius:12px;background:rgba(255,255,255,0.65);
    color:var(--tinta);cursor:pointer;line-height:1.35;width:100%;
    transition:transform .12s ease,box-shadow .15s ease,background .15s ease,border-color .15s ease}
  .gt-root .qopt:hover:not(:disabled){transform:translateY(-2px);border-color:var(--dorado);box-shadow:0 6px 14px -8px rgba(22,58,46,0.5)}
  .gt-root .qopt:disabled{cursor:default}
  .gt-root .qopt.pick{background:var(--verde);color:var(--papel);border-color:var(--verde)}
  .gt-root .result{text-align:center;padding:0.4rem 0 0.3rem}
  .gt-root .result .emoji{font-size:3rem;line-height:1;margin-bottom:0.5rem}
  .gt-root .result .eres{font-size:0.72rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--dorado);font-weight:700;margin-bottom:0.2rem}
  .gt-root .result .nombre{font-family:'Newsreader',serif;font-size:1.75rem;color:var(--verde);line-height:1.15;margin-bottom:0.8rem;font-weight:600}
  .gt-root .result .msg{font-size:1rem;color:var(--tinta);max-width:34ch;margin:0 auto 1rem;line-height:1.5;text-align:left}
  .gt-root .dato{background:rgba(22,58,46,0.07);border-left:3px solid var(--dorado);border-radius:8px;padding:0.7rem 0.85rem;font-size:0.87rem;line-height:1.45;text-align:left;margin:0 auto 1.3rem;max-width:34ch}
  .gt-root .dato b{display:block;font-size:0.68rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--dorado);margin-bottom:0.2rem}
  .gt-root .btn{font-family:'Work Sans',sans-serif;font-size:0.9rem;font-weight:600;padding:0.6rem 1.25rem;border:none;border-radius:999px;cursor:pointer;background:var(--verde);color:#F4EFE3;white-space:nowrap;transition:transform .12s ease,background .15s ease}
  .gt-root .btn:hover{background:var(--dorado);transform:translateY(-2px)}
  @media (prefers-reduced-motion: reduce){.gt-root *{animation:none !important;transition:none !important}}
</style>
</head>
<body>
<div class="gt-root">
  <div class="card" id="gt-card">
    <p class="top"><span class="dot"></span> Fitosensible · Elige tu experiencia</p>
    <div id="gt-stage"></div>
  </div>
</div>

<script>
(function(){
  // Ajusta esta ruta a donde hospedes el juego "El rizobio"
  var IFRAME_JUEGO_SRC = '/juegos/el-rizobio.html';

  var stage = document.getElementById('gt-stage');

  // Le avisa a la página padre cuánto mide el contenido, para que
  // ajuste la altura del <iframe> en vez de reservar un tamaño fijo.
  function reportHeight(){
    var h = document.getElementById('gt-card').offsetHeight + 20; // +20 por el padding del body
    parent.postMessage({ type: 'gate-rizobio-milpa-height', height: h }, '*');
  }
  if (window.ResizeObserver){
    new ResizeObserver(reportHeight).observe(document.getElementById('gt-card'));
  } else {
    // Respaldo para navegadores sin ResizeObserver
    setInterval(reportHeight, 400);
  }
  window.addEventListener('load', reportHeight);

  function gate(){
    stage.innerHTML =
      '<p class="q gt-fade">¿Te sientes con ánimo de rizobio, o prefieres tu tarot de la milpa?</p>' +
      '<div class="opts gt-fade">' +
        '<button class="opt" id="gt-juego">' +
          '<span class="emo">🦠</span>' +
          '<span><span class="tit">Ánimo de rizobio</span><span class="desc">Métete al nódulo y vive el trato: atrapa nitrógeno, conviértelo, y no dejes que el oxígeno te gane.</span></span>' +
        '</button>' +
        '<button class="opt" id="gt-quiz">' +
          '<span class="emo">🔮</span>' +
          '<span><span class="tit">Tarot de la milpa</span><span class="desc">Cinco preguntas para saber qué lugar te toca en la milpa.</span></span>' +
        '</button>' +
      '</div>';
    document.getElementById('gt-juego').addEventListener('click', showJuego);
    document.getElementById('gt-quiz').addEventListener('click', showQuiz);
  }

  function backBtn(){ return '<button class="back" id="gt-back">← Elegir otra vez</button>'; }
  function wireBack(){ document.getElementById('gt-back').addEventListener('click', gate); }

  function showJuego(){
    stage.innerHTML = backBtn() +
      '<iframe class="gt-fade" src="' + IFRAME_JUEGO_SRC + '" title="El rizobio — Fitosensible" loading="lazy"></iframe>';
    wireBack();
  }

  function showQuiz(){
    stage.innerHTML = backBtn() + '<div id="gt-quizhost" class="gt-fade"></div>';
    wireBack();
    runQuiz(document.getElementById('gt-quizhost'));
  }

  function runQuiz(host){
    var PER_GAME = 5;

    var PERFILES = {
      rizobio:{e:'🔑',n:'Rizobio',
        m:'Eres el inquilino que sí paga la renta —y bien pagada—. Vives en casa ajena, te dan de comer, y a cambio traes la única llave que abre el candado del aire. Nadie te ve, nadie te nombra, y aun así: sin ti aquí no come nadie. Puritita humildad con superpoderes.',
        d:'El rizobio vive en los nódulos del frijol y rompe el nitrógeno del aire, algo que ni las plantas ni los animales sabemos hacer. La planta le pone casa y azúcares; él paga con nitrógeno. Techo por renta.'},
      micorriza:{e:'🍄',n:'Micorriza',
        m:'Tú eres de los que conocen a alguien que conoce a alguien. Tus hilos llegan hasta donde nadie se ha asomado, y siempre apareces con lo que hacía falta, quién sabe de dónde. Media milpa te debe un favor y ni cuenta se ha dado.',
        d:'Los hongos micorrízicos extienden hilos finísimos por el suelo, mucho más lejos de donde llega la raíz, y le traen fósforo y agua a la planta a cambio de azúcares. La segunda gran alianza de la milpa.'},
      maiz:{e:'🌽',n:'Maíz',
        m:'Alto, derecho y con toda la gente encaramada encima. Aguantas al frijol, le das sombra a la calabaza, sostienes la fiesta entera y ni te quejas. Eso sí, seamos honestos: ya ni sabrías reproducirte sin que alguien te desgrane la mazorca. Todos dependemos de alguien, mi buen.',
        d:'El maíz domesticado no puede reproducirse solo: sin manos humanas que desgranen la mazorca y la vuelvan a sembrar, desaparecería. Nos necesita tanto como nosotros a él.'},
      frijol:{e:'🫘',n:'Frijol',
        m:'Siempre trepado en alguien, sí. Pero que quede clarito: no eres arrimado, eres socio. Traes el nitrógeno del aire y le das de comer a toda la parcela. Y encima, en la mesa, sales de suculento camarón de surco.',
        d:'El frijol no fija nitrógeno solo: lo hace gracias a las bacterias que hospeda en sus nódulos. Ni el más generoso de la milpa se salva de necesitar a alguien.'},
      calabaza:{e:'🎃',n:'Calabaza',
        m:'Tirada abajo, sin que nadie te pele. Guardas la humedad, ahogas a la hierba mala, espantas bichos con tus pelitos ásperos, y jamás sales en la foto. Eres la mamá de la milpa: todo mundo come gracias a ti y nadie te lo agradece.',
        d:'Las hojas grandes de la calabaza cubren el suelo, reducen la evaporación y le quitan luz a las malezas. Es el manto que protege a la milpa entera.'},
      humano:{e:'🤲',n:'Humano',
        m:'Ándale. Creías que ibas de mirón, ¿verdad? Pues no: tú también estás metido en el trato. Siembras, deshierbas, cosechas —y a cambio te dan de comer—. No eres el dueño de esta alianza, mi buen. Eres un socio más, y de los que llegaron tarde.',
        d:'La simbiosis definitiva no es la del frijol con su bacteria: es la nuestra, con todo lo que nos da de comer. Al morderle a un taco, te comes el nitrógeno que una bacteria le robó al aire.'},
      glifosato:{e:'💀',n:'Glifosato',
        m:'Ay, mano. Entraste a un quiz de la milpa y te salió esto. Llegas prometiendo que todo va a ser facilito, dejas la tierra bien limpiecita… y al tercer año ya nadie puede vivir sin ti y todos te deben dinero. Ándale, vuelve a jugar. Hasta para ti hay redención.',
        d:'El problema nunca fue una sola molécula: fue el modelo. Semilla que hay que recomprar cada año, suelo que ya no produce sin ayuda química, y un agricultor amarrado a la rueda.'}
    };

    var BANK = [
      {q:"En un trabajo en equipo, tú…",o:[
        ["Traes la maña que nadie más tiene","rizobio"],
        ["Conoces a alguien que conoce a alguien","micorriza"],
        ["Cargas con el proyecto entero, como siempre","maiz"],
        ["Organizas a todos y te cuelgas la medalla","humano"]]},
      {q:"Vives arrimado en casa ajena. ¿Cómo lo llevas?",o:[
        ["Pago con algo que vale más que la renta","rizobio"],
        ["Me trepo, sí, pero pongo lo mío","frijol"],
        ["Prefiero yo poner la casa y que se arrimen","maiz"],
        ["Yo pago mi renta, gracias","humano"]]},
      {q:"Tu superpoder secreto sería…",o:[
        ["Abrir lo que nadie puede abrir","rizobio"],
        ["Estirarme hasta donde nadie se asoma","micorriza"],
        ["Aguantar el peso sin chistar","maiz"],
        ["Cuidar a todos sin que nadie lo note","calabaza"]]},
      {q:"En una fiesta te encuentran…",o:[
        ["En un rincón, hablando en serio con una sola persona","rizobio"],
        ["Presentando gente entre sí toda la noche","micorriza"],
        ["En medio, aguantando a los que se te cuelgan","maiz"],
        ["Levantando los vasos que otros dejaron","calabaza"]]},
      {q:"¿Cómo te llevas con la tierra?",o:[
        ["La dejo más rica de como la encontré","rizobio"],
        ["Me la recorro toda, hasta el último rincón","micorriza"],
        ["La cubro, la tapo, la cuido","calabaza"],
        ["La trabajo, y de ella como","humano"]]},
      {q:"Te dicen: “tú solito no puedes”.",o:[
        ["Y tienen razón. Nadie puede","frijol"],
        ["Cierto: yo pongo la mitad, tú la otra","rizobio"],
        ["Me ofende… pero luego lo pienso","maiz"],
        ["¿Cómo no? Yo me basto y me sobro","glifosato"]]},
      {q:"Tu manera de resolver un problema:",o:[
        ["Con paciencia, poquito a poquito","micorriza"],
        ["Buscando quién me complemente","frijol"],
        ["Aguantando vara hasta que pase","maiz"],
        ["A lo bruto, y que se quite el que estorbe","glifosato"]]},
      {q:"Te ofrecen producir el doble, ya, sin esfuerzo.",o:[
        ["Desconfío: ¿a costa de qué?","humano"],
        ["No, gracias: prefiero que dure","calabaza"],
        ["¡Órale! ¿Qué puede salir mal?","glifosato"],
        ["Prefiero hacerlo acompañado","frijol"]]},
      {q:"¿Qué te da más orgullo?",o:[
        ["Que sin mí, aquí nadie come","rizobio"],
        ["Que llego a donde nadie llega","micorriza"],
        ["Que otros crezcan trepados en mí","maiz"],
        ["Que cuido lo que nadie mira","calabaza"]]},
      {q:"Tu peor defecto, si te obligan a confesarlo…",o:[
        ["Que ya no sé vivir sin mis socios","maiz"],
        ["Que siempre ando trepado en alguien","frijol"],
        ["Que nadie sabe ni la mitad de lo que hago","calabaza"],
        ["Que a veces me creo el dueño de todo","humano"]]},
      {q:"El domingo perfecto:",o:[
        ["En casa, tranquilo, trabajando en silencio","rizobio"],
        ["Saliendo a rascar por rincones nuevos","micorriza"],
        ["Rodeado de gente que se me arrima","maiz"],
        ["Guisando algo rico para los demás","humano"]]},
      {q:"¿Cómo pagas un favor?",o:[
        ["Con algo que al otro le hace falta y no tiene","rizobio"],
        ["Con azúcar, literal o de la otra","maiz"],
        ["Poniendo el cuerpo cuando haga falta","calabaza"],
        ["Con otro favor, pero más grande","micorriza"]]},
      {q:"¿Trabajar solo? ¿Qué opinas?",o:[
        ["Imposible: nadie prospera en soledad","frijol"],
        ["Se puede, pero rinde menos","micorriza"],
        ["Yo lo hago… aunque acabo molido","maiz"],
        ["Es lo mío: llego, despejo el terreno, y ya","glifosato"]]},
      {q:"Si fueras algo de la comida, serías…",o:[
        ["Los frijoles, que completan lo que al maíz le falta","frijol"],
        ["La tortilla, que sostiene todo lo demás","maiz"],
        ["El chile, que hace que todo se aproveche","humano"],
        ["Lo que nadie ve, pero lo cambia todo","micorriza"]]},
      {q:"¿Cuál frase va más contigo?",o:[
        ["Doy lo que tengo, recibo lo que me falta","rizobio"],
        ["Mis raíces llegan más lejos de lo que se ve","micorriza"],
        ["Sostengo, aunque pese","maiz"],
        ["Sin mí, ni se siembra ni se come","humano"]]}
    ];

    var fill, counter, qstage, quiz=[], idx=0, pts={}, ganador=null;

    function shuffle(a){a=a.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}

    host.innerHTML =
      '<div class="bar"><div class="bar-fill" id="qf-fill"></div></div>' +
      '<p class="counter" id="qf-counter"></p>' +
      '<div id="qf-stage"></div>';
    fill = document.getElementById('qf-fill');
    counter = document.getElementById('qf-counter');
    qstage = document.getElementById('qf-stage');

    function start(){
      quiz = shuffle(BANK).slice(0, PER_GAME); idx = 0; pts = {}; ganador = null;
      render();
    }

    function render(){
      var it = quiz[idx];
      counter.textContent = 'Pregunta ' + (idx+1) + ' de ' + quiz.length;
      fill.style.width = ((idx)/quiz.length*100) + '%';
      var html = '<div class="gt-fade"><p class="q-text">' + it.q + '</p><div class="qopts">';
      var ops = shuffle(it.o);
      ops.forEach(function(o, i){
        html += '<button class="qopt" data-p="' + o[1] + '" data-i="' + i + '">' + o[0] + '</button>';
      });
      html += '</div></div>';
      qstage.innerHTML = html;
      Array.prototype.forEach.call(qstage.querySelectorAll('.qopt'), function(b){
        b.addEventListener('click', function(){ pick(b); });
      });
    }

    function pick(btn){
      var p = btn.getAttribute('data-p');
      pts[p] = (pts[p]||0) + 1;
      Array.prototype.forEach.call(qstage.querySelectorAll('.qopt'), function(b){ b.disabled = true; });
      btn.classList.add('pick');
      setTimeout(function(){
        idx++;
        if (idx < quiz.length){ render(); } else { finish(); }
      }, 420);
    }

    function finish(){
      fill.style.width = '100%';
      counter.textContent = 'Resultado';
      var max = -1;
      for (var k in pts){ if (pts[k] > max){ max = pts[k]; ganador = k; } }
      if (!ganador) ganador = 'humano';
      var r = PERFILES[ganador];
      qstage.innerHTML =
        '<div class="result">' +
          '<div class="emoji">' + r.e + '</div>' +
          '<p class="eres">En la milpa, tú eres</p>' +
          '<h3 class="nombre">' + r.n + '</h3>' +
          '<p class="msg">' + r.m + '</p>' +
          '<div class="dato"><b>Y esto es verdad</b>' + r.d + '</div>' +
          '<button class="btn" id="qf-again">Jugar otra vez</button>' +
        '</div>';
      document.getElementById('qf-again').addEventListener('click', start);
    }

    start();
  }

  gate();

  window.addEventListener('message', function(e){
    if (e.data && e.data.type === 'rizobio-height'){
      var f = document.querySelector('.gt-root iframe');
      if (f) f.style.height = e.data.height + 'px';
    }
  });
})();
</script>
</div>
</body>
</html>
